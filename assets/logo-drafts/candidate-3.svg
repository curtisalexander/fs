<?xml version="1.0" encoding="UTF-8"?>
<!--
  Failed Star — Candidate 3: "Brown Dwarf"
  The astronomical take. A dim star that never ignited: it sits inside a
  faint radial glow (the heat it can't quite sustain), with a couple of tiny
  orbiting motes and a single cold spark that fizzled out above its head
  (it tried to light, and couldn't). Hunched posture: head bowed left,
  one lower point sagging. Palette leans dim ember -> dusty red-magenta,
  never bright/happy yellow.
  Has a transparent background so the glow blends onto dark themes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img"
     aria-label="Failed Star: a dim brown-dwarf star, hunched and unlit">
  <defs>
    <!-- faint surrounding glow: warm in the center, fading to nothing -->
    <radialGradient id="glow3" cx="50%" cy="54%" r="50%">
      <stop offset="0"    stop-color="#e8a04b" stop-opacity="0.40"/>
      <stop offset="0.45" stop-color="#a8553a" stop-opacity="0.22"/>
      <stop offset="1"    stop-color="#a8553a" stop-opacity="0"/>
    </radialGradient>
    <!-- body shading: dim ember top, sinking into dusty red-magenta below -->
    <radialGradient id="body3" cx="46%" cy="40%" r="70%">
      <stop offset="0"   stop-color="#e09a52"/>
      <stop offset="0.6" stop-color="#b85f3c"/>
      <stop offset="1"   stop-color="#7e3b4a"/>
    </radialGradient>
  </defs>

  <!-- faint heat glow behind everything -->
  <circle cx="62" cy="66" r="58" fill="url(#glow3)"/>

  <!-- two tiny orbiting motes (dim, like debris that never coalesced) -->
  <circle cx="106" cy="40" r="2.6" fill="#e8a04b" opacity="0.85"/>
  <circle cx="20"  cy="92" r="2"   fill="#c77a86" opacity="0.7"/>

  <!--
    The fizzled spark: a tiny 4-point sparkle above the head, dim and
    cracked, signalling the ignition that failed. Kept faint on purpose.
  -->
  <g opacity="0.65" stroke="#cdb89a" stroke-width="1.6" stroke-linecap="round">
    <path d="M 48 16 v 8"/>
    <path d="M 44 20 h 8"/>
  </g>

  <!--
    BODY: hunched 5-point star. Head (top point) bows left and forward;
    the lower-left point sags long like a tired, hanging arm.
  -->
  <path d="
    M 62 26
    C 64 36, 64 40, 60 44
    L 38 50
    C 47 58, 52 62, 54 68
    C 50 82, 44 92, 38 102
    C 50 96, 58 94, 66 94
    C 74 98, 82 102, 90 106
    C 88 94, 86 84, 86 76
    C 93 70, 98 64, 104 58
    L 82 52
    C 82 42, 76 32, 62 26
    Z"
    fill="url(#body3)" stroke="#6e3340" stroke-width="3"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!--
    FACE: minimal and dim. Droopy half-closed eyes (a flat lid line with a
    short downward tick at the outer corner) and a small frown. Low contrast
    on purpose so the mark feels "cold", but still readable.
  -->
  <g stroke="#3a2026" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- left droopy eye: lid sweeps down toward the outer (left) corner -->
    <path d="M 49 60 q 7 3 12 4"/>
    <!-- right droopy eye: lid sweeps down toward the outer (right) corner -->
    <path d="M 78 61 q -7 3 -12 4"/>
    <!-- small frown -->
    <path d="M 55 80 q 7 -6 14 0"/>
  </g>
</svg>
