<?xml version="1.0" encoding="UTF-8"?>
<!--
  Failed Star — Candidate 2: "Chibi Mascot"
  A rounder, cuter take with a big expressive face. The body is a 5-point
  star with softened (round-joined) points; it slouches forward, the top
  point flops over like a tired head, and the lower points splay like
  dangling little legs. Warm "brown dwarf" palette (ember amber body,
  red-brown shading). A single bead of sweat sells the dejection.
  Built from layered primitives (not a single path) so a human can tweak
  each feature independently.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img"
     aria-label="Failed Star: a cute, hunched, disappointed star mascot">
  <defs>
    <!-- soft vertical body shading: brighter ember on top, dim red-brown below -->
    <linearGradient id="body2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#e8a04b"/>
      <stop offset="1"   stop-color="#bd6a3c"/>
    </linearGradient>
  </defs>

  <!--
    BODY: chibi star with rounded joints. Drawn leaning right and hunched:
    note the top point curls left (flopped head) and the body center sits low.
    round line-joins + a matching stroke fatten the silhouette so it stays
    bold and legible when shrunk to favicon size.
  -->
  <path d="
    M 64 18
    C 68 28, 70 34, 66 40
    L 40 44
    C 50 54, 54 58, 56 64
    C 52 76, 48 86, 44 96
    C 56 92, 62 90, 68 90
    C 76 94, 84 98, 92 102
    C 90 90, 88 82, 88 74
    C 96 66, 102 60, 108 54
    L 84 48
    C 84 38, 78 26, 64 18
    Z"
    fill="url(#body2)" stroke="#a8553a" stroke-width="4"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!--
    FACE GROUP — big and central for a chibi feel.
    Droopy half-closed eyes: upper lid is a heavy downward arc, with a small
    pupil low underneath, giving that "tired, about to cry" look.
  -->
  <g>
    <!-- left eye: heavy droopy upper lid -->
    <path d="M 51 58 q 6 6 12 0" fill="none" stroke="#3a1f18"
          stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="57" cy="63" r="2.1" fill="#3a1f18"/>
    <!-- right eye -->
    <path d="M 69 58 q 6 6 12 0" fill="none" stroke="#3a1f18"
          stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="75" cy="63" r="2.1" fill="#3a1f18"/>

    <!-- worried angled brows above the eyes (inner ends raised = sad) -->
    <path d="M 50 52 l 12 -3" fill="none" stroke="#3a1f18"
          stroke-width="2.6" stroke-linecap="round"/>
    <path d="M 82 52 l -12 -3" fill="none" stroke="#3a1f18"
          stroke-width="2.6" stroke-linecap="round"/>

    <!-- small downturned frown -->
    <path d="M 60 76 q 6 -6 12 0" fill="none" stroke="#3a1f18"
          stroke-width="3.4" stroke-linecap="round"/>
  </g>

  <!-- a single bead of sweat near the right cheek -->
  <path d="M 92 60
           c -3 5 -3 8 0 8
           c 3 0 3 -3 0 -8 Z"
        fill="#cdd6e6" stroke="#8aa0c0" stroke-width="0.8"/>
</svg>
